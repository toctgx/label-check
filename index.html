<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Check</title>
  <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg:#0e0e0f; --surface:#1a1a1d; --surface2:#242428; --border:#2e2e33;
      --text-primary:#f0f0f0; --text-secondary:#888; --text-muted:#555;
      --accent:#4f8ef7; --accent-soft:#1a2a45;
      --input-bg:#111114; --thumb-bg:#2a2a2e;
      --btn-bg:#f0f0f0; --btn-text:#0e0e0f;
      --shadow:0 2px 16px rgba(0,0,0,0.4);
      --upload-hover:#14213a;
      --dropdown-bg:#1e1e22; --dropdown-hover:#2a2a30;
      --diff-add:#1a3a1a; --diff-add-text:#6fcf5a;
      --diff-del:#3a1a1a; --diff-del-text:#f08080;
      --diff-chg:#2a2a10; --diff-chg-text:#f0c060;
    }
    :root[data-theme="light"] {
      --bg:#f5f5f0; --surface:#fff; --surface2:#fafafa; --border:#e8e8e8;
      --text-primary:#1a1a1a; --text-secondary:#555; --text-muted:#aaa;
      --accent:#4a90e2; --accent-soft:#f0f6ff;
      --input-bg:#fafafa; --thumb-bg:#f0f0f0;
      --btn-bg:#1a1a1a; --btn-text:#fff;
      --shadow:0 2px 12px rgba(0,0,0,0.06);
      --upload-hover:#f0f6ff;
      --dropdown-bg:#fff; --dropdown-hover:#f5f5f5;
      --diff-add:#e8fae8; --diff-add-text:#1a6e10;
      --diff-del:#fae8e8; --diff-del-text:#a02020;
      --diff-chg:#faf8e0; --diff-chg-text:#7a6000;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;transition:background .2s;}

    header{width:100%;max-width:480px;margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;}
    header .titles h1{font-size:20px;font-weight:700;color:var(--text-primary);letter-spacing:-.5px;}
    header .titles p{font-size:13px;color:var(--text-muted);margin-top:4px;}
    .theme-toggle{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;flex-shrink:0;margin-top:2px;}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

    .tab-bar{width:100%;max-width:480px;display:flex;gap:8px;background:var(--surface);border-radius:14px;padding:5px;margin-bottom:16px;border:1px solid var(--border);}
    .tab-btn{flex:1;padding:9px 0;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--text-muted);}
    .tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,142,247,.3);}
    .tab-panel{display:none;width:100%;}
    .tab-panel.active{display:contents;}

    .card{background:var(--surface);border-radius:16px;padding:20px;width:100%;max-width:480px;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid var(--border);transition:background .2s,border-color .2s;}
    .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;}
    .field{margin-bottom:16px;} .field:last-child{margin-bottom:0;}
    label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
    input[type="text"],input[type="date"]{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text-primary);background:var(--input-bg);transition:border-color .15s;outline:none;-webkit-appearance:none;}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);}
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.8);}
    input[type="text"]:focus,input[type="date"]:focus{border-color:var(--accent);}

    .bpcs-wrap{position:relative;}
    .bpcs-input-row{display:flex;gap:8px;align-items:center;}
    .bpcs-input-row input[type="text"]{flex:1;}
    .bpcs-clear-btn{width:34px;height:44px;flex-shrink:0;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
    .bpcs-clear-btn:hover{border-color:var(--accent);color:var(--accent);}
    .bpcs-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--dropdown-bg);border:1.5px solid var(--accent);border-radius:12px;max-height:240px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;}
    .bpcs-dropdown.open{display:block;}
    .bpcs-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
    .bpcs-item:last-child{border-bottom:none;}
    .bpcs-item:hover,.bpcs-item.active{background:var(--dropdown-hover);}
    .bpcs-item .bpcs-code{font-size:13px;font-weight:700;color:var(--accent);}
    .bpcs-item .bpcs-name{font-size:12px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bpcs-highlight{color:var(--accent);font-weight:700;}
    .bpcs-empty{padding:16px 14px;font-size:13px;color:var(--text-muted);text-align:center;}
    .bpcs-selected-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 10px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:20px;font-size:12px;color:var(--accent);font-weight:600;}

    .upload-zone{border:2px dashed var(--border);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;background:var(--input-bg);transition:border-color .15s,background .15s;position:relative;}
    .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--upload-hover);}
    .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .upload-icon{font-size:32px;margin-bottom:8px;}
    .upload-hint{font-size:13px;color:var(--text-muted);line-height:1.5;}
    .upload-hint strong{color:var(--accent);font-weight:600;}
    .preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
    .preview-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--thumb-bg);}
    .preview-item img{width:100%;height:100%;object-fit:cover;}
    .preview-item .remove-btn{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,.6);border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    .submit-btn{width:100%;max-width:480px;padding:16px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:-.2px;transition:opacity .15s,transform .1s;}
    .submit-btn:hover{opacity:.85;}
    .submit-btn:active{transform:scale(.98);}
    .submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* OCR 진행 오버레이 */
    .ocr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;display:none;}
    .ocr-overlay.show{display:flex;}
    .ocr-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ocr-label{color:#fff;font-size:15px;font-weight:600;}
    .ocr-progress{color:#aaa;font-size:13px;}

    /* 변경사항 모달 */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:flex-end;justify-content:center;display:none;}
    .modal-backdrop.show{display:flex;}
    .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:24px 20px 32px;}
    .modal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .modal-icon{font-size:28px;}
    .modal-title{font-size:17px;font-weight:700;color:var(--text-primary);}
    .modal-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}
    .diff-block{margin-bottom:12px;}
    .diff-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
    .diff-line{font-size:13px;font-family:'SF Mono',monospace;padding:6px 10px;border-radius:6px;margin-bottom:3px;line-height:1.5;word-break:break-all;}
    .diff-line.add{background:var(--diff-add);color:var(--diff-add-text);}
    .diff-line.del{background:var(--diff-del);color:var(--diff-del-text);}
    .diff-line.same{background:var(--surface2);color:var(--text-secondary);}
    .modal-actions{display:flex;gap:8px;margin-top:20px;}
    .modal-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
    .modal-btn.primary{background:var(--accent);color:#fff;}
    .modal-btn.secondary{background:var(--surface2);color:var(--text-primary);border:1.5px solid var(--border);}
    .modal-btn:hover{opacity:.85;}

    /* 최신 이미지 뱃지 */
    .latest-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:20px;font-size:11px;font-weight:600;color:var(--accent);}
    .latest-info{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:10px;}
    .latest-info img{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;}
    .latest-info-text{flex:1;min-width:0;}

    /* 기록 리스트 */
    .record-list{width:100%;max-width:480px;}
    .record-item{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .record-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--thumb-bg);flex-shrink:0;}
    .record-thumb-empty{width:44px;height:44px;border-radius:8px;background:var(--thumb-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .record-info{flex:1;min-width:0;}
    .record-po{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .record-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .no-records{text-align:center;color:var(--text-muted);font-size:13px;padding:16px 0;}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);opacity:.8;}
    .badge-warn{background:#3a1a00;color:#f0a060;border-color:#f0a060;}
    [data-theme="light"] .badge-warn{background:#fff3e0;color:#b05000;border-color:#b05000;}

    /* 제품 추가 */
    .custom-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#1f2a1a;color:#6fcf5a;border:1px solid #6fcf5a;opacity:.9;}
    [data-theme="light"] .custom-badge{background:#edfae8;color:#2d8c1c;border-color:#2d8c1c;}
    .product-item{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .product-icon{width:44px;height:44px;border-radius:8px;background:var(--thumb-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .product-info{flex:1;min-width:0;}
    .product-name{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .product-code{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .product-delete{width:28px;height:28px;border-radius:8px;background:transparent;border:1.5px solid var(--border);color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
    .product-delete:hover{border-color:#e05c5c;color:#e05c5c;}

    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text-primary);border:1px solid var(--border);padding:12px 20px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:transform .3s ease,opacity .3s ease;z-index:999;white-space:nowrap;box-shadow:var(--shadow);}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  </style>
</head>
<body>

<header>
  <div class="titles">
    <h1>📦 Label Check</h1>
    <p>수입제품 입고 라벨 비교</p>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">📋 입고 등록</button>
  <button class="tab-btn" id="tab-product" onclick="switchTab('product')">➕ 제품 추가</button>
</div>

<!-- ══ 입고 등록 탭 ══ -->
<div class="tab-panel active" id="panel-register">

<div class="card">
  <div class="section-title">입고 정보</div>

  <div class="field">
    <label for="date">날짜</label>
    <input type="date" id="date" />
  </div>

  <div class="field">
    <label>BPCS CODE</label>
    <div class="bpcs-wrap" id="bpcsWrap">
      <div class="bpcs-input-row">
        <input type="text" id="bpcsInput" placeholder="코드 또는 품명으로 검색 / 직접 입력" autocomplete="off" />
        <button class="bpcs-clear-btn" onclick="clearBpcs()" title="초기화">✕</button>
      </div>
      <div class="bpcs-dropdown" id="bpcsDropdown"></div>
      <div id="bpcsTag"></div>
      <div id="latestInfo"></div>
    </div>
  </div>

  <div class="field">
    <label for="po">PO #</label>
    <input type="text" id="po" placeholder="예: PO-2026-001" autocomplete="off" />
  </div>
</div>

<div class="card">
  <div class="section-title">입고 사진 <span style="color:var(--text-muted);font-weight:400;font-size:11px;text-transform:none;">(OCR 텍스트 비교용 — 첫 번째 사진 기준)</span></div>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="upload-icon">📷</div>
    <div class="upload-hint"><strong>사진 선택</strong> 또는 드래그해서 업로드<br/>여러 장 동시 선택 가능</div>
  </div>
  <div class="preview-grid" id="previewGrid"></div>
</div>

<button class="submit-btn" id="saveBtn" onclick="saveRecord()">저장하기</button>

<div style="width:100%;max-width:480px;margin-top:28px;margin-bottom:8px;">
  <div class="section-title">저장된 기록</div>
  <div class="record-list" id="recordList"></div>
</div>

</div><!-- /panel-register -->

<!-- ══ 제품 추가 탭 ══ -->
<div class="tab-panel" id="panel-product">
<div class="card">
  <div class="section-title">새 제품 등록</div>
  <div class="field">
    <label for="newProductName">제품명 <span style="color:var(--accent)">*</span></label>
    <input type="text" id="newProductName" placeholder="예: 하인즈 신제품 소스 500g" autocomplete="off" />
  </div>
  <div class="field">
    <label for="newProductCode">BPCS CODE <span style="color:var(--text-muted);font-weight:400;">(없으면 자동 부여)</span></label>
    <input type="text" id="newProductCode" placeholder="예: 63011200" autocomplete="off" />
  </div>
  <div class="field">
    <label for="newProductMemo">메모 <span style="color:var(--text-muted);font-weight:400;">(선택)</span></label>
    <input type="text" id="newProductMemo" placeholder="예: 신규 소싱, 거래처 ○○" autocomplete="off" />
  </div>
</div>
<button class="submit-btn" onclick="saveProduct()">제품 추가하기</button>
<div style="width:100%;max-width:480px;margin-top:28px;margin-bottom:8px;">
  <div class="section-title">추가된 제품 목록</div>
  <div id="productList"></div>
</div>
</div><!-- /panel-product -->

<!-- OCR 오버레이 -->
<div class="ocr-overlay" id="ocrOverlay">
  <div class="ocr-spinner"></div>
  <div class="ocr-label" id="ocrLabel">🔍 라벨 텍스트 분석 중...</div>
  <div class="ocr-progress" id="ocrProgress">잠시만 기다려주세요</div>
</div>

<!-- 변경사항 모달 -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="diffModal">
    <div class="modal-header">
      <div class="modal-icon">⚠️</div>
      <div>
        <div class="modal-title">라벨 텍스트 변경 감지!</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
    </div>
    <div id="diffContent"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">취소 (저장 안 함)</button>
      <button class="modal-btn primary" onclick="confirmSave()">확인하고 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ 저장 완료!</div>

<script>
// ── BPCS 마스터 데이터 ──
const BPCS_LIST = [
  {code:"63010024",name:"하인즈 클래시코 토마토&바질 680gX12"},
  {code:"63010028",name:"화이트 소스(2.9KG*6)"},
  {code:"63010030",name:"하인즈 칠리 소스 340gX12"},
  {code:"63010032",name:"하인즈 우스타 소스 340gX12"},
  {code:"63010035",name:"H)칠리소스3.232KG"},
  {code:"63010042",name:"H)토마토 페이스트3.147KG"},
  {code:"63010044",name:"H)토마토 소스2.92KG"},
  {code:"63010045",name:"하인즈 볼팍 케첩 12.92kg x 1"},

  {code:"63010048",name:"하인즈 토마토 퓨레 3kg x 6"},
  {code:"63010056",name:"H)벨오또 크러쉬드 토마토 3.03kg x 6"},
  {code:"63010058",name:"하인즈 레드 와인 식초 355mlX12"},
  {code:"63010060",name:"화이트 식초(1겔론*6)"},
  {code:"63010062",name:"(H)스몰홀 코셔딜 피클(3KG)"},
  {code:"63010251",name:"아라 데미그라스 소스3KG*4"},
  {code:"63010256",name:"HWC A10 칠리소스3.3KG*6"},
  {code:"63010257",name:"룸서비스 케첩64G*60"},
  {code:"63010270",name:"W)RTS데미그라스소스830G*12"},
  {code:"63010272",name:"W)데미그라스소스840G*12"},
  {code:"63010280",name:"하인즈 클래시코구운토마토와마늘680gX12"},
  {code:"63010283",name:"A10하인즈 토마토케찹3.23kg*6"},
  {code:"63010291",name:"하인즈 홀필드페어토마토인주스 2.89kg x 6"},
  {code:"63010307",name:"하인즈 클래시코로스티드갈릭알프레도425G*12"},
  {code:"63010338",name:"하인즈볼팍랙키트"},
  {code:"63010343",name:"하인즈저그케찹3.23kg*6"},
  {code:"63010344",name:"하인즈 저그 머스타드 2.94kg x 6"},

// ── 테마 ──
const savedTheme = localStorage.getItem('theme') || 'dark';
setTheme(savedTheme);
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

document.getElementById('date').valueAsDate = new Date();

// ── BPCS 검색 ──
const bpcsInput = document.getElementById('bpcsInput');
const dropdown = document.getElementById('bpcsDropdown');
const bpcsTag = document.getElementById('bpcsTag');
const latestInfo = document.getElementById('latestInfo');
let selectedBpcs = null;
let activeIdx = -1;

bpcsInput.addEventListener('input',()=>{selectedBpcs=null;bpcsTag.innerHTML='';latestInfo.innerHTML='';renderDropdown(bpcsInput.value.trim());});
bpcsInput.addEventListener('focus',()=>renderDropdown(bpcsInput.value.trim()));
bpcsInput.addEventListener('keydown',(e)=>{
  const items=dropdown.querySelectorAll('.bpcs-item');
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);updateActive(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);updateActive(items);}
  else if(e.key==='Enter'){e.preventDefault();if(activeIdx>=0&&items[activeIdx])items[activeIdx].click();else closeDropdown();}
  else if(e.key==='Escape')closeDropdown();
});
document.addEventListener('click',(e)=>{if(!document.getElementById('bpcsWrap').contains(e.target))closeDropdown();});
function updateActive(items){items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));if(items[activeIdx])items[activeIdx].scrollIntoView({block:'nearest'});}
function highlight(text,query){if(!query)return text;const re=new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');return text.replace(re,'<span class="bpcs-highlight">$1</span>');}

function renderDropdown(query){
  const custom=getCustomProducts();
  const combined=[...custom.map(p=>({code:p.code,name:p.name,_custom:true})),...BPCS_LIST];
  activeIdx=-1;
  const filtered=query?combined.filter(b=>b.code.toLowerCase().includes(query.toLowerCase())||b.name.toLowerCase().includes(query.toLowerCase())).slice(0,50):combined.slice(0,50);
  if(filtered.length===0){dropdown.innerHTML='<div class="bpcs-empty">검색 결과 없음 — 직접 입력도 가능해요</div>';}
  else{
    dropdown.innerHTML=filtered.map((b,i)=>`
      <div class="bpcs-item" data-code="${b.code}" data-name="${b.name}" data-idx="${i}">
        <div class="bpcs-code">${highlight(b.code,query)}${b._custom?' <span style="font-size:10px;color:#6fcf5a">[직접추가]</span>':''}</div>
        <div class="bpcs-name">${highlight(b.name,query)}</div>
      </div>`).join('');
    dropdown.querySelectorAll('.bpcs-item').forEach(el=>el.addEventListener('click',()=>selectBpcs(el.dataset.code,el.dataset.name)));
  }
  dropdown.classList.add('open');
}

function selectBpcs(code,name){
  selectedBpcs={code,name};
  bpcsInput.value=code;
  bpcsTag.innerHTML=`<div class="bpcs-selected-tag">✓ ${name}</div>`;
  closeDropdown();
  // 최신 이미지 정보 표시
  const latest=getLatestByCode(code);
  if(latest){
    latestInfo.innerHTML=`
      <div class="latest-info">
        ${latest.imageDataUrl?`<img src="${latest.imageDataUrl}" />`:'<div style="width:40px;height:40px;border-radius:6px;background:var(--thumb-bg);display:flex;align-items:center;justify-content:center">📦</div>'}
        <div class="latest-info-text">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary)">이전 라벨 있음</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${latest.date} 입고 · 저장 시 텍스트 비교</div>
        </div>
        <span class="latest-badge">비교 대기</span>
      </div>`;
  } else {
    latestInfo.innerHTML=`<div style="font-size:12px;color:var(--text-muted);margin-top:8px;padding:0 2px">첫 번째 입고 — 비교 기준으로 저장됩니다</div>`;
  }
}

function clearBpcs(){selectedBpcs=null;bpcsInput.value='';bpcsTag.innerHTML='';latestInfo.innerHTML='';closeDropdown();bpcsInput.focus();}
function closeDropdown(){dropdown.classList.remove('open');activeIdx=-1;}

// ── 사진 업로드 ──
let selectedFiles=[];
const fileInput=document.getElementById('fileInput');
const previewGrid=document.getElementById('previewGrid');
const uploadZone=document.getElementById('uploadZone');
fileInput.addEventListener('change',(e)=>handleFiles(e.target.files));
uploadZone.addEventListener('dragover',(e)=>{e.preventDefault();uploadZone.classList.add('drag-over');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop',(e)=>{e.preventDefault();uploadZone.classList.remove('drag-over');handleFiles(e.dataTransfer.files);});
function handleFiles(files){Array.from(files).forEach(file=>{if(!file.type.startsWith('image/'))return;const reader=new FileReader();reader.onload=(e)=>{selectedFiles.push({name:file.name,dataUrl:e.target.result});renderPreviews();};reader.readAsDataURL(file);});}
function renderPreviews(){previewGrid.innerHTML='';selectedFiles.forEach((f,i)=>{const div=document.createElement('div');div.className='preview-item';div.innerHTML=`<img src="${f.dataUrl}" /><button class="remove-btn" onclick="removeFile(${i})">✕</button>`;previewGrid.appendChild(div);});}
function removeFile(index){selectedFiles.splice(index,1);renderPreviews();}

// ── 최신 이미지 저장소 ──
function getLatestStore(){return JSON.parse(localStorage.getItem('labelLatest')||'{}');}
function getLatestByCode(code){return getLatestStore()[code]||null;}
function saveLatest(code,data){const store=getLatestStore();store[code]=data;localStorage.setItem('labelLatest',JSON.stringify(store));}

// ── OCR ──
async function runOCR(imageDataUrl){
  return new Promise(async(resolve)=>{
    try{
      const worker=await Tesseract.createWorker('eng',1,{
        workerPath:'https://unpkg.com/tesseract.js@4.1.1/dist/worker.min.js',
        langPath:'https://tessdata.projectnaptha.com/4.0.0',
        corePath:'https://unpkg.com/tesseract.js-core@4.0.4/tesseract-core.wasm.js',
        logger:(m)=>{
          if(m.status==='recognizing text'){
            document.getElementById('ocrProgress').textContent=`분석 중... ${Math.round(m.progress*100)}%`;
          }
        }
      });
      const {data:{text}}=await worker.recognize(imageDataUrl);
      await worker.terminate();
      resolve(text.trim());
    }catch(e){
      console.error('OCR error',e);
      resolve('');
    }
  });
}

// ── diff 계산 ──
function computeDiff(oldText,newText){
  const oldLines=oldText.split('\n').filter(l=>l.trim());
  const newLines=newText.split('\n').filter(l=>l.trim());
  const result=[];
  const oldSet=new Set(oldLines);
  const newSet=new Set(newLines);
  const allLines=[...new Set([...oldLines,...newLines])];
  allLines.forEach(line=>{
    if(oldSet.has(line)&&newSet.has(line)){result.push({type:'same',text:line});}
    else if(!oldSet.has(line)&&newSet.has(line)){result.push({type:'add',text:line});}
    else if(oldSet.has(line)&&!newSet.has(line)){result.push({type:'del',text:line});}
  });
  return result;
}

// ── 저장 대기 데이터 ──
let pendingSave=null;

async function saveRecord(){
  const date=document.getElementById('date').value;
  const bpcsCode=bpcsInput.value.trim();
  const bpcsName=selectedBpcs?selectedBpcs.name:'';
  const po=document.getElementById('po').value.trim();
  if(!date||!bpcsCode||!po){alert('날짜, BPCS CODE, PO#을 모두 입력해주세요.');return;}
  if(selectedFiles.length===0){alert('입고 사진을 1장 이상 업로드해주세요.');return;}

  const saveBtn=document.getElementById('saveBtn');
  saveBtn.disabled=true;

  // OCR 실행
  const overlay=document.getElementById('ocrOverlay');
  overlay.classList.add('show');
  document.getElementById('ocrLabel').textContent='🔍 라벨 텍스트 분석 중...';
  document.getElementById('ocrProgress').textContent='첫 번째 사진 처리 중';

  // 모든 이미지 OCR
  let allTexts=[];
  for(let i=0;i<selectedFiles.length;i++){
    document.getElementById('ocrLabel').textContent=`🔍 라벨 텍스트 분석 중... (${i+1}/${selectedFiles.length}장)`;
    document.getElementById('ocrProgress').textContent='';
    const t=await runOCR(selectedFiles[i].dataUrl);
    if(t)allTexts.push(t);
  }
  const newText=allTexts.join('\n---\n');
  overlay.classList.remove('show');
  saveBtn.disabled=false;

  const newRecord={
    id:Date.now(), date, bpcs:bpcsCode, bpcsName, po,
    photos:selectedFiles.map(f=>f.dataUrl),
    ocrText:newText,
    savedAt:new Date().toISOString()
  };

  const latest=getLatestByCode(bpcsCode);

  if(latest&&latest.ocrText){
    // 텍스트 비교
    const diff=computeDiff(latest.ocrText,newText);
    const hasChange=diff.some(d=>d.type!=='same');
    if(hasChange){
      // 변경 있음 → 모달
      pendingSave={newRecord,bpcsCode,newText,imageDataUrl:selectedFiles[0].dataUrl};
      showDiffModal(latest,diff);
      return;
    }
  }

  // 변경 없거나 첫 입고 → 바로 저장
  doSave(newRecord,bpcsCode,newText,selectedFiles[0].dataUrl);
}

function showDiffModal(latest,diff){
  document.getElementById('modalSub').textContent=
    `이전 입고(${latest.date})와 텍스트가 다릅니다`;
  const changes=diff.filter(d=>d.type!=='same');
  const same=diff.filter(d=>d.type==='same');
  let html='';
  if(changes.length){
    html+=`<div class="diff-block">
      <div class="diff-label">변경된 내용 (${changes.length}건)</div>`;
    changes.forEach(d=>{
      const icon=d.type==='add'?'＋':'－';
      html+=`<div class="diff-line ${d.type}">${icon} ${escHtml(d.text)}</div>`;
    });
    html+='</div>';
  }
  if(same.length){
    html+=`<div class="diff-block">
      <div class="diff-label">동일한 내용 (${same.length}건)</div>`;
    same.slice(0,5).forEach(d=>{html+=`<div class="diff-line same">  ${escHtml(d.text)}</div>`;});
    if(same.length>5)html+=`<div style="font-size:12px;color:var(--text-muted);padding:4px 10px">... 외 ${same.length-5}줄</div>`;
    html+='</div>';
  }
  document.getElementById('diffContent').innerHTML=html;
  document.getElementById('modalBackdrop').classList.add('show');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('show');
  pendingSave=null;
}

function confirmSave(){
  if(!pendingSave)return;
  doSave(pendingSave.newRecord,pendingSave.bpcsCode,pendingSave.newText,pendingSave.imageDataUrl);
  closeModal();
}

function doSave(newRecord,bpcsCode,newText,imageDataUrl){
  // 입고 기록 저장
  const records=JSON.parse(localStorage.getItem('labelRecords')||'[]');
  records.unshift(newRecord);
  localStorage.setItem('labelRecords',JSON.stringify(records));

  // 최신 이미지 교체 (이전 이미지 삭제 = 덮어쓰기)
  saveLatest(bpcsCode,{
    bpcs:bpcsCode,
    bpcsName:newRecord.bpcsName,
    date:newRecord.date,
    po:newRecord.po,
    imageDataUrl:newRecord.photos[0],
    allImages:newRecord.photos,
    ocrText:newText,
    savedAt:newRecord.savedAt
  });

  // 폼 초기화
  document.getElementById('date').valueAsDate=new Date();
  clearBpcs();
  document.getElementById('po').value='';
  selectedFiles=[]; renderPreviews(); fileInput.value='';
  showToast(); renderRecords();
}

function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function renderRecords(){
  const records=JSON.parse(localStorage.getItem('labelRecords')||'[]');
  const list=document.getElementById('recordList');
  if(records.length===0){list.innerHTML='<div class="no-records">아직 저장된 기록이 없어요</div>';return;}
  list.innerHTML=records.map(r=>`
    <div class="record-item">
      ${r.photos&&r.photos.length>0?`<img class="record-thumb" src="${r.photos[0]}" />`:`<div class="record-thumb-empty">📦</div>`}
      <div class="record-info">
        <div class="record-po">PO# ${r.po}</div>
        <div class="record-meta">${r.date} · ${r.bpcs}${r.bpcsName?' · '+r.bpcsName.substring(0,16)+'…':''}</div>
        <div class="record-meta">사진 ${r.photos?r.photos.length:0}장${r.ocrText?` · OCR ✓ (${r.photos.length}장 분석)`:''}</div>
      </div>
      <span class="badge">입고</span>
    </div>`).join('');
}

// ── 제품 추가 ──
function switchTab(tab){['register','product'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===tab);document.getElementById('panel-'+t).classList.toggle('active',t===tab);});}
function getCustomProducts(){return JSON.parse(localStorage.getItem('customProducts')||'[]');}
function saveProduct(){
  const name=document.getElementById('newProductName').value.trim();
  let code=document.getElementById('newProductCode').value.trim();
  const memo=document.getElementById('newProductMemo').value.trim();
  if(!name){alert('제품명을 입력해주세요.');return;}
  if(!code){const existing=getCustomProducts();const num=String(existing.length+1).padStart(3,'0');code='CUSTOM-'+num;}
  const products=getCustomProducts();
  if(products.find(p=>p.code===code)||BPCS_LIST.find(b=>b.code===code)){if(!confirm(`코드 "${code}" 가 이미 존재해요. 그래도 추가할까요?`))return;}
  products.unshift({code,name,memo,addedAt:new Date().toISOString()});
  localStorage.setItem('customProducts',JSON.stringify(products));
  document.getElementById('newProductName').value='';
  document.getElementById('newProductCode').value='';
  document.getElementById('newProductMemo').value='';
  showToast(); renderProductList();
}
function deleteProduct(code){if(!confirm(`"${code}" 제품을 삭제할까요?`))return;const products=getCustomProducts().filter(p=>p.code!==code);localStorage.setItem('customProducts',JSON.stringify(products));renderProductList();}
function renderProductList(){
  const products=getCustomProducts();
  const list=document.getElementById('productList');
  if(products.length===0){list.innerHTML='<div class="no-records">아직 추가된 제품이 없어요</div>';return;}
  list.innerHTML=products.map(p=>`
    <div class="product-item">
      <div class="product-icon">🆕</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-code">${p.code}${p.memo?' · '+p.memo:''}</div>
      </div>
      <span class="custom-badge" style="margin-right:6px">직접추가</span>
      <button class="product-delete" onclick="deleteProduct('${p.code}')">✕</button>
    </div>`).join('');
}

renderRecords();
renderProductList();
</script>
