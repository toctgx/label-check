<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Label Check</title>
  <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <style>
    :root[data-theme="dark"]{
      --bg:#0e0e0f;--surface:#1a1a1d;--surface2:#242428;--border:#2e2e33;
      --text-primary:#f0f0f0;--text-secondary:#888;--text-muted:#555;
      --accent:#4f8ef7;--accent-soft:#1a2a45;
      --input-bg:#111114;--thumb-bg:#2a2a2e;
      --btn-bg:#f0f0f0;--btn-text:#0e0e0f;
      --shadow:0 2px 16px rgba(0,0,0,.4);--upload-hover:#14213a;
      --dropdown-bg:#1e1e22;--dropdown-hover:#2a2a30;
      --diff-add:#1a3a1a;--diff-add-text:#6fcf5a;
      --diff-del:#3a1a1a;--diff-del-text:#f08080;
      --prev-border:#2e2e33;--new-border:#4f8ef7;
    }
    :root[data-theme="light"]{
      --bg:#f5f5f0;--surface:#fff;--surface2:#fafafa;--border:#e8e8e8;
      --text-primary:#1a1a1a;--text-secondary:#555;--text-muted:#aaa;
      --accent:#4a90e2;--accent-soft:#f0f6ff;
      --input-bg:#fafafa;--thumb-bg:#f0f0f0;
      --btn-bg:#1a1a1a;--btn-text:#fff;
      --shadow:0 2px 12px rgba(0,0,0,.06);--upload-hover:#f0f6ff;
      --dropdown-bg:#fff;--dropdown-hover:#f5f5f5;
      --diff-add:#e8fae8;--diff-add-text:#1a6e10;
      --diff-del:#fae8e8;--diff-del-text:#a02020;
      --prev-border:#e8e8e8;--new-border:#4a90e2;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;transition:background .2s;}

    header{width:100%;max-width:480px;margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;}
    header h1{font-size:20px;font-weight:700;color:var(--text-primary);letter-spacing:-.5px;}
    header p{font-size:13px;color:var(--text-muted);margin-top:4px;}
    .theme-toggle{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;color:var(--text-secondary);cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .15s;}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

    .tab-bar{width:100%;max-width:480px;display:flex;gap:8px;background:var(--surface);border-radius:14px;padding:5px;margin-bottom:16px;border:1px solid var(--border);}
    .tab-btn{flex:1;padding:9px 0;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--text-muted);}
    .tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,142,247,.3);}
    .tab-panel{display:none;width:100%;}
    .tab-panel.active{display:contents;}

    .card{background:var(--surface);border-radius:16px;padding:20px;width:100%;max-width:480px;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid var(--border);}
    .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;}
    .field{margin-bottom:16px;} .field:last-child{margin-bottom:0;}
    label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
    input[type="text"],input[type="date"]{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text-primary);background:var(--input-bg);transition:border-color .15s;outline:none;-webkit-appearance:none;}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);}
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.8);}
    input:focus{border-color:var(--accent);}

    /* BPCS */
    .bpcs-wrap{position:relative;}
    .bpcs-row{display:flex;gap:8px;align-items:center;}
    .bpcs-row input{flex:1;}
    .bpcs-clear{width:34px;height:44px;flex-shrink:0;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .bpcs-clear:hover{border-color:var(--accent);color:var(--accent);}
    .bpcs-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--dropdown-bg);border:1.5px solid var(--accent);border-radius:12px;max-height:240px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;}
    .bpcs-dropdown.open{display:block;}
    .bpcs-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
    .bpcs-item:last-child{border-bottom:none;}
    .bpcs-item:hover,.bpcs-item.hi{background:var(--dropdown-hover);}
    .bpcs-code{font-size:13px;font-weight:700;color:var(--accent);}
    .bpcs-name{font-size:12px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hl{color:var(--accent);font-weight:700;}
    .bpcs-empty{padding:16px 14px;font-size:13px;color:var(--text-muted);text-align:center;}
    .bpcs-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 10px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:20px;font-size:12px;color:var(--accent);font-weight:600;}

    /* 업로드 */
    .upload-zone{border:2px dashed var(--border);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;background:var(--input-bg);transition:border-color .15s,background .15s;position:relative;}
    .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--upload-hover);}
    .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .upload-icon{font-size:28px;margin-bottom:6px;}
    .upload-hint{font-size:13px;color:var(--text-muted);line-height:1.5;}
    .upload-hint strong{color:var(--accent);font-weight:600;}

    /* ── 비교 카드 ── */
    .compare-card{background:var(--surface);border-radius:16px;padding:16px;width:100%;max-width:480px;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid var(--border);display:none;}
    .compare-card.show{display:block;}
    .compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .compare-title{font-size:13px;font-weight:700;color:var(--text-primary);}
    .compare-status{font-size:12px;color:var(--text-muted);}

    .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .compare-side{border-radius:10px;overflow:hidden;border:2px solid var(--prev-border);position:relative;}
    .compare-side.new-side{border-color:var(--new-border);}
    .compare-side img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
    .compare-side-label{position:absolute;bottom:0;left:0;right:0;padding:6px 8px;font-size:11px;font-weight:700;text-align:center;}
    .compare-side .prev-label{background:rgba(0,0,0,.55);color:#ccc;}
    .compare-side .new-label{background:rgba(79,142,247,.7);color:#fff;}
    .compare-empty{width:100%;aspect-ratio:1;background:var(--thumb-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
    .compare-empty span{font-size:28px;}
    .compare-empty p{font-size:11px;color:var(--text-muted);}

    /* 다중 썸네일 */
    .new-thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%;aspect-ratio:1;}
    .new-thumbs img{width:100%;height:100%;object-fit:cover;display:block;}
    .new-thumbs.single img{aspect-ratio:1;}

    /* OCR 상태 */
    .ocr-status{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:10px;margin-bottom:10px;}
    .ocr-spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ocr-status-text{font-size:13px;color:var(--text-secondary);flex:1;}
    .ocr-done{color:var(--accent);}

    /* diff 결과 */
    .diff-section{margin-top:4px;}
    .diff-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
    .diff-line{font-size:12px;font-family:'SF Mono',monospace;padding:5px 10px;border-radius:6px;margin-bottom:3px;line-height:1.5;word-break:break-all;}
    .diff-line.add{background:var(--diff-add);color:var(--diff-add-text);}
    .diff-line.del{background:var(--diff-del);color:var(--diff-del-text);}
    .diff-line.same{background:var(--surface2);color:var(--text-secondary);}
    .diff-ok{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--diff-add);border-radius:10px;font-size:13px;font-weight:600;color:var(--diff-add-text);}

    /* 버튼 */
    .submit-btn{width:100%;max-width:480px;padding:16px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;}
    .submit-btn:hover{opacity:.85;}
    .submit-btn:active{transform:scale(.98);}
    .submit-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

    /* 기록 */
    .record-list{width:100%;max-width:480px;}
    .record-item{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .rec-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
    .rec-thumb-empty{width:44px;height:44px;border-radius:8px;background:var(--thumb-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .rec-info{flex:1;min-width:0;}
    .rec-po{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rec-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);}
    .badge-warn{background:#3a2000;color:#f0b060;border-color:#f0b060;}
    [data-theme="light"] .badge-warn{background:#fff3e0;color:#a05000;border-color:#a05000;}
    .no-records{text-align:center;color:var(--text-muted);font-size:13px;padding:16px 0;}

    /* 제품 추가 */
    .custom-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#1f2a1a;color:#6fcf5a;border:1px solid #6fcf5a;}
    [data-theme="light"] .custom-badge{background:#edfae8;color:#2d8c1c;border-color:#2d8c1c;}
    .product-item{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .product-icon{width:44px;height:44px;border-radius:8px;background:var(--thumb-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .product-info{flex:1;min-width:0;}
    .product-name{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .product-code{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .product-del{width:28px;height:28px;border-radius:8px;background:transparent;border:1.5px solid var(--border);color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
    .product-del:hover{border-color:#e05c5c;color:#e05c5c;}

    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text-primary);border:1px solid var(--border);padding:12px 20px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:transform .3s,opacity .3s;z-index:999;white-space:nowrap;box-shadow:var(--shadow);}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  </style>
</head>
<body>

<header>
  <div>
    <h1>📦 Label Check</h1>
    <p>수입제품 입고 라벨 비교</p>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">📋 입고 등록</button>
  <button class="tab-btn" id="tab-product" onclick="switchTab('product')">➕ 제품 추가</button>
</div>

<!-- ══ 입고 등록 ══ -->
<div class="tab-panel active" id="panel-register">

<div class="card">
  <div class="section-title">입고 정보</div>
  <div class="field">
    <label>날짜</label>
    <input type="date" id="date"/>
  </div>
  <div class="field">
    <label>BPCS CODE</label>
    <div class="bpcs-wrap" id="bpcsWrap">
      <div class="bpcs-row">
        <input type="text" id="bpcsInput" placeholder="코드 또는 품명으로 검색 / 직접 입력" autocomplete="off"/>
        <button class="bpcs-clear" onclick="clearBpcs()">✕</button>
      </div>
      <div class="bpcs-dropdown" id="bpcsDropdown"></div>
      <div id="bpcsTag"></div>
    </div>
  </div>
  <div class="field">
    <label>PO #</label>
    <input type="text" id="po" placeholder="예: PO-2026-001" autocomplete="off"/>
  </div>
</div>

<div class="card">
  <div class="section-title">입고 사진 업로드</div>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple/>
    <div class="upload-icon">📷</div>
    <div class="upload-hint"><strong>사진 선택</strong> 또는 드래그<br/>여러 장 동시 선택 가능</div>
  </div>
</div>

<!-- 비교 카드 (업로드 후 표시) -->
<div class="compare-card" id="compareCard">
  <div class="compare-header">
    <div class="compare-title">🔍 라벨 비교</div>
    <div class="compare-status" id="compareStatus"></div>
  </div>

  <div class="compare-grid">
    <!-- 이전 -->
    <div class="compare-side" id="prevSide">
      <div class="compare-empty" id="prevEmpty">
        <span>📭</span>
        <p>이전 라벨 없음</p>
      </div>
      <img id="prevImg" style="display:none"/>
      <div class="compare-side-label prev-label">이전 입고</div>
    </div>
    <!-- 새 -->
    <div class="compare-side new-side" id="newSide">
      <div class="new-thumbs" id="newThumbs"></div>
      <div class="compare-side-label new-label">새 입고</div>
    </div>
  </div>

  <!-- OCR 상태 -->
  <div class="ocr-status" id="ocrStatus">
    <div class="ocr-spinner" id="ocrSpinner"></div>
    <div class="ocr-status-text" id="ocrStatusText">OCR 분석 중...</div>
  </div>

  <!-- diff 결과 -->
  <div class="diff-section" id="diffSection" style="display:none"></div>
</div>

<button class="submit-btn" id="saveBtn" onclick="saveRecord()" style="display:none">저장하기</button>

<div style="width:100%;max-width:480px;margin-top:28px;margin-bottom:8px;">
  <div class="section-title">저장된 기록</div>
  <div class="record-list" id="recordList"></div>
</div>

</div><!-- /panel-register -->

<!-- ══ 제품 추가 ══ -->
<div class="tab-panel" id="panel-product">
<div class="card">
  <div class="section-title">새 제품 등록</div>
  <div class="field">
    <label>제품명 <span style="color:var(--accent)">*</span></label>
    <input type="text" id="newName" placeholder="예: 하인즈 신제품 소스 500g" autocomplete="off"/>
  </div>
  <div class="field">
    <label>BPCS CODE <span style="color:var(--text-muted);font-weight:400">(없으면 자동)</span></label>
    <input type="text" id="newCode" placeholder="예: 63011200" autocomplete="off"/>
  </div>
  <div class="field">
    <label>메모 <span style="color:var(--text-muted);font-weight:400">(선택)</span></label>
    <input type="text" id="newMemo" placeholder="예: 신규 소싱" autocomplete="off"/>
  </div>
</div>
<button class="submit-btn" onclick="saveProduct()">제품 추가하기</button>
<div style="width:100%;max-width:480px;margin-top:28px;margin-bottom:8px;">
  <div class="section-title">추가된 제품 목록</div>
  <div id="productList"></div>
</div>
</div><!-- /panel-product -->

<div class="toast" id="toast">✅ 저장 완료!</div>

<script>
// ── BPCS 데이터 ──

const savedTheme=localStorage.getItem('theme')||'dark';
setTheme(savedTheme);
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

document.getElementById('date').valueAsDate=new Date();

// ── BPCS 검색 ──
const bpcsInput=document.getElementById('bpcsInput');
const dropdown=document.getElementById('bpcsDropdown');
let selectedBpcs=null,activeIdx=-1;

bpcsInput.addEventListener('input',()=>{selectedBpcs=null;document.getElementById('bpcsTag').innerHTML='';renderDD(bpcsInput.value.trim());});
bpcsInput.addEventListener('focus',()=>renderDD(bpcsInput.value.trim()));
bpcsInput.addEventListener('keydown',(e)=>{
  const items=dropdown.querySelectorAll('.bpcs-item');
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);updActive(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);updActive(items);}
  else if(e.key==='Enter'){e.preventDefault();if(activeIdx>=0&&items[activeIdx])items[activeIdx].click();else closeDD();}
  else if(e.key==='Escape')closeDD();
});
document.addEventListener('click',(e)=>{if(!document.getElementById('bpcsWrap').contains(e.target))closeDD();});
function updActive(items){items.forEach((el,i)=>el.classList.toggle('hi',i===activeIdx));if(items[activeIdx])items[activeIdx].scrollIntoView({block:'nearest'});}
function hl(text,q){if(!q)return text;return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="hl">$1</span>');}

function renderDD(q){
  const custom=getCustomProducts();
  const combined=[...custom.map(p=>({code:p.code,name:p.name,_c:true})),...BPCS_LIST];
  activeIdx=-1;
  const filtered=q?combined.filter(b=>b.code.toLowerCase().includes(q.toLowerCase())||b.name.toLowerCase().includes(q.toLowerCase())).slice(0,50):combined.slice(0,50);
  dropdown.innerHTML=filtered.length===0
    ?'<div class="bpcs-empty">검색 결과 없음 — 직접 입력 가능</div>'
    :filtered.map((b,i)=>`<div class="bpcs-item" data-code="${b.code}" data-name="${b.name}"><div class="bpcs-code">${hl(b.code,q)}${b._c?' <span style="font-size:10px;color:#6fcf5a">[직접추가]</span>':''}</div><div class="bpcs-name">${hl(b.name,q)}</div></div>`).join('');
  dropdown.querySelectorAll('.bpcs-item').forEach(el=>el.addEventListener('click',()=>selBpcs(el.dataset.code,el.dataset.name)));
  dropdown.classList.add('open');
}
function selBpcs(code,name){
  selectedBpcs={code,name};
  bpcsInput.value=code;
  document.getElementById('bpcsTag').innerHTML=`<div class="bpcs-tag">✓ ${name}</div>`;
  closeDD();
  // 사진이 이미 업로드돼 있으면 비교 카드 갱신
  if(selectedFiles.length>0)triggerCompare();
}
function clearBpcs(){selectedBpcs=null;bpcsInput.value='';document.getElementById('bpcsTag').innerHTML='';closeDD();bpcsInput.focus();}
function closeDD(){dropdown.classList.remove('open');activeIdx=-1;}

// ── 사진 업로드 ──
let selectedFiles=[];
const fileInput=document.getElementById('fileInput');
const uploadZone=document.getElementById('uploadZone');

fileInput.addEventListener('change',(e)=>handleFiles(e.target.files));
uploadZone.addEventListener('dragover',(e)=>{e.preventDefault();uploadZone.classList.add('drag-over');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop',(e)=>{e.preventDefault();uploadZone.classList.remove('drag-over');handleFiles(e.dataTransfer.files);});

function handleFiles(files){
  const newFiles=Array.from(files).filter(f=>f.type.startsWith('image/'));
  if(!newFiles.length)return;
  let loaded=0;
  newFiles.forEach(file=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      selectedFiles.push({name:file.name,dataUrl:e.target.result});
      loaded++;
      if(loaded===newFiles.length)triggerCompare();
    };
    reader.readAsDataURL(file);
  });
}

// ── 비교 카드 표시 & OCR ──
let ocrAborted=false;

async function triggerCompare(){
  if(!selectedFiles.length)return;
  ocrAborted=false;
  const bpcsCode=bpcsInput.value.trim();
  const latest=bpcsCode?getLatestByCode(bpcsCode):null;

  // 비교 카드 표시
  const card=document.getElementById('compareCard');
  card.classList.add('show');
  document.getElementById('saveBtn').style.display='block';

  // 이전 이미지
  const prevImg=document.getElementById('prevImg');
  const prevEmpty=document.getElementById('prevEmpty');
  if(latest&&latest.imageDataUrl){
    prevImg.src=latest.imageDataUrl;
    prevImg.style.display='block';
    prevEmpty.style.display='none';
    document.getElementById('compareStatus').textContent=`이전: ${latest.date}`;
  }else{
    prevImg.style.display='none';
    prevEmpty.style.display='flex';
    document.getElementById('compareStatus').textContent='첫 입고';
  }

  // 새 이미지 썸네일
  const newThumbs=document.getElementById('newThumbs');
  if(selectedFiles.length===1){
    newThumbs.className='new-thumbs single';
    newThumbs.innerHTML=`<img src="${selectedFiles[0].dataUrl}" style="aspect-ratio:1"/>`;
  }else{
    newThumbs.className='new-thumbs';
    newThumbs.innerHTML=selectedFiles.map(f=>`<img src="${f.dataUrl}"/>`).join('');
  }

  // 저장 버튼 즉시 활성화 (OCR과 무관)
  document.getElementById('saveBtn').disabled=false;

  // OCR 백그라운드 실행
  const ocrSt=document.getElementById('ocrStatus');
  const ocrTxt=document.getElementById('ocrStatusText');
  const diffSec=document.getElementById('diffSection');
  ocrSt.style.display='flex';
  diffSec.style.display='none';

  let allTexts=[];
  for(let i=0;i<selectedFiles.length;i++){
    if(ocrAborted)return;
    ocrTxt.textContent=`OCR 분석 중... (${i+1}/${selectedFiles.length}장)`;
    const t=await runOCR(selectedFiles[i].dataUrl,(p)=>{
      if(!ocrAborted)ocrTxt.textContent=`OCR 분석 중... (${i+1}/${selectedFiles.length}장) ${Math.round(p*100)}%`;
    });
    if(ocrAborted)return;
    if(t)allTexts.push(t);
  }

  const newText=allTexts.join('\n---\n');
  pendingOcrText=newText;

  // diff 계산
  ocrSt.style.display='none';
  diffSec.style.display='block';

  if(!latest||!latest.ocrText){
    diffSec.innerHTML=`<div class="diff-ok">✅ 이전 라벨 없음 — 이번 입고가 기준이 됩니다</div>`;
  }else{
    const diff=computeDiff(latest.ocrText,newText);
    const changes=diff.filter(d=>d.type!=='same');
    if(changes.length===0){
      diffSec.innerHTML=`<div class="diff-ok">✅ 이전 라벨과 동일합니다</div>`;
    }else{
      let html=`<div class="diff-label">⚠️ 변경된 내용 (${changes.length}건)</div>`;
      changes.forEach(d=>{
        html+=`<div class="diff-line ${d.type}">${d.type==='add'?'＋':'－'} ${escHtml(d.text)}</div>`;
      });
      const same=diff.filter(d=>d.type==='same');
      if(same.length){
        html+=`<div class="diff-label" style="margin-top:10px">동일 항목 (${same.length}건)</div>`;
        same.slice(0,4).forEach(d=>{html+=`<div class="diff-line same">　${escHtml(d.text)}</div>`;});
        if(same.length>4)html+=`<div style="font-size:12px;color:var(--text-muted);padding:4px 10px">... 외 ${same.length-4}줄</div>`;
      }
      diffSec.innerHTML=html;
    }
  }
}

let pendingOcrText='';

// ── OCR ──
async function runOCR(imageDataUrl,onProgress){
  try{
    const worker=await Tesseract.createWorker('eng',1,{
      workerPath:'https://unpkg.com/tesseract.js@4.1.1/dist/worker.min.js',
      langPath:'https://tessdata.projectnaptha.com/4.0.0',
      corePath:'https://unpkg.com/tesseract.js-core@4.0.4/tesseract-core.wasm.js',
      logger:(m)=>{if(m.status==='recognizing text'&&onProgress)onProgress(m.progress);}
    });
    const {data:{text}}=await worker.recognize(imageDataUrl);
    await worker.terminate();
    return text.trim();
  }catch(e){return '';}
}

// ── diff ──
function computeDiff(oldText,newText){
  const oldLines=oldText.split('\n').filter(l=>l.trim());
  const newLines=newText.split('\n').filter(l=>l.trim());
  const oldSet=new Set(oldLines),newSet=new Set(newLines);
  const all=[...new Set([...oldLines,...newLines])];
  return all.map(line=>{
    if(oldSet.has(line)&&newSet.has(line))return{type:'same',text:line};
    if(!oldSet.has(line))return{type:'add',text:line};
    return{type:'del',text:line};
  });
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 저장 ──
function saveRecord(){
  const date=document.getElementById('date').value;
  const bpcsCode=bpcsInput.value.trim();
  const bpcsName=selectedBpcs?selectedBpcs.name:'';
  const po=document.getElementById('po').value.trim();
  if(!date||!bpcsCode||!po){alert('날짜, BPCS CODE, PO#을 모두 입력해주세요.');return;}
  if(!selectedFiles.length){alert('입고 사진을 1장 이상 업로드해주세요.');return;}

  const newRecord={
    id:Date.now(),date,bpcs:bpcsCode,bpcsName,po,
    photos:selectedFiles.map(f=>f.dataUrl),
    ocrText:pendingOcrText,
    savedAt:new Date().toISOString()
  };

  // 입고 기록 저장
  const records=JSON.parse(localStorage.getItem('labelRecords')||'[]');
  records.unshift(newRecord);
  localStorage.setItem('labelRecords',JSON.stringify(records));

  // 최신 이미지 교체
  const store=JSON.parse(localStorage.getItem('labelLatest')||'{}');
  store[bpcsCode]={
    bpcs:bpcsCode,bpcsName,date,po,
    imageDataUrl:selectedFiles[0].dataUrl,
    allImages:selectedFiles.map(f=>f.dataUrl),
    ocrText:pendingOcrText,
    savedAt:newRecord.savedAt
  };
  localStorage.setItem('labelLatest',JSON.stringify(store));

  // ── 화면 리셋 ──
  ocrAborted=true;
  document.getElementById('date').valueAsDate=new Date();
  clearBpcs();
  document.getElementById('po').value='';
  selectedFiles=[];
  fileInput.value='';
  pendingOcrText='';
  document.getElementById('compareCard').classList.remove('show');
  document.getElementById('saveBtn').style.display='none';

  showToast();
  renderRecords();
}

// ── 최신 저장소 ──
function getLatestByCode(code){return JSON.parse(localStorage.getItem('labelLatest')||'{}')[code]||null;}
function getCustomProducts(){return JSON.parse(localStorage.getItem('customProducts')||'[]');}

function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function renderRecords(){
  const records=JSON.parse(localStorage.getItem('labelRecords')||'[]');
  const list=document.getElementById('recordList');
  if(!records.length){list.innerHTML='<div class="no-records">아직 저장된 기록이 없어요</div>';return;}
  list.innerHTML=records.map(r=>`
    <div class="record-item">
      ${r.photos?.length?`<img class="rec-thumb" src="${r.photos[0]}" />`:`<div class="rec-thumb-empty">📦</div>`}
      <div class="rec-info">
        <div class="rec-po">PO# ${r.po}</div>
        <div class="rec-meta">${r.date} · ${r.bpcs}${r.bpcsName?' · '+r.bpcsName.substring(0,14)+'…':''}</div>
        <div class="rec-meta">사진 ${r.photos?.length||0}장${r.ocrText?' · OCR ✓':''}</div>
      </div>
      <span class="badge">입고</span>
    </div>`).join('');
}

// ── 탭 ──
function switchTab(tab){
  ['register','product'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
  });
}

// ── 제품 추가 ──
function saveProduct(){
  const name=document.getElementById('newName').value.trim();
  let code=document.getElementById('newCode').value.trim();
  const memo=document.getElementById('newMemo').value.trim();
  if(!name){alert('제품명을 입력해주세요.');return;}
  if(!code){const ex=getCustomProducts();code='CUSTOM-'+String(ex.length+1).padStart(3,'0');}
  const products=getCustomProducts();
  if(products.find(p=>p.code===code)||BPCS_LIST.find(b=>b.code===code)){if(!confirm(`코드 "${code}" 이미 존재해요. 그래도 추가할까요?`))return;}
  products.unshift({code,name,memo,addedAt:new Date().toISOString()});
  localStorage.setItem('customProducts',JSON.stringify(products));
  document.getElementById('newName').value='';document.getElementById('newCode').value='';document.getElementById('newMemo').value='';
  showToast();renderProductList();
}
function deleteProduct(code){if(!confirm(`"${code}" 삭제할까요?`))return;localStorage.setItem('customProducts',JSON.stringify(getCustomProducts().filter(p=>p.code!==code)));renderProductList();}
function renderProductList(){
  const products=getCustomProducts();
  const list=document.getElementById('productList');
  if(!products.length){list.innerHTML='<div class="no-records">아직 추가된 제품이 없어요</div>';return;}
  list.innerHTML=products.map(p=>`
    <div class="product-item">
      <div class="product-icon">🆕</div>
      <div class="product-info"><div class="product-name">${p.name}</div><div class="product-code">${p.code}${p.memo?' · '+p.memo:''}</div></div>
      <span class="custom-badge" style="margin-right:6px">직접추가</span>
      <button class="product-del" onclick="deleteProduct('${p.code}')">✕</button>
    </div>`).join('');
}

renderRecords();
renderProductList();
</script>
